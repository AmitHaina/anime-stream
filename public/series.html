<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Series - AnimeStream</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="/style.css">
</head>
<body>
  <header id="siteHeader"><a href="/"><h1>AnimeStream</h1></a></header>
  <main>
    <div id="seriesHero" class="series-hero">
      <div class="series-hero-content">
        <h2 id="seriesTitle">Loading...</h2>
        <div class="series-meta" id="seriesMeta"></div>
        <p id="seriesDesc"></p>
        <div class="hero-actions">
          <button class="btn-play" id="heroPlayBtn">▶ Play</button>
        </div>
      </div>
    </div>
    <div class="episodes-section">
      <div class="episodes-header">
        <h3>Episodes</h3>
        <select id="seasons" class="season-select"></select>
      </div>
      <div id="episodes" class="episodes"></div>
    </div>
  </main>
  <script src="/series.js"></script>
</body>
</html>
